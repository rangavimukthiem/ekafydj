{# Reusable stat card component. Include with title, value, icon, and color. #}
<div class="bg-surface-800 border border-surface-600 rounded-xl p-5 card-hover">
  <div class="flex items-center justify-between mb-3">
    <span class="text-xs font-medium text-surface-400 uppercase tracking-wide">{{ title }}</span>
    <div class="w-8 h-8 rounded-lg flex items-center justify-center
      {% if color == 'green' %}bg-green-900/40 text-green-400
      {% elif color == 'red' %}bg-red-900/40 text-red-400
      {% elif color == 'yellow' %}bg-yellow-900/40 text-yellow-400
      {% elif color == 'purple' %}bg-purple-900/40 text-purple-400
      {% else %}bg-brand-900/40 text-brand-400{% endif %}">
      {% if icon == 'folder' %}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
      {% elif icon == 'check-circle' %}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {% elif icon == 'x-circle' %}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      {% elif icon == 'cpu' %}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4m0 0h18"/></svg>
      {% endif %}
    </div>
  </div>
  <p class="text-3xl font-bold text-gray-100">{{ value }}</p>
</div>

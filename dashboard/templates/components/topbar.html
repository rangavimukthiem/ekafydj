<!-- Topbar -->
<header class="sticky top-0 z-40 h-14 flex items-center justify-between px-6 bg-surface-800/80 backdrop-blur-md border-b border-surface-600">
  <div class="flex items-center gap-4">
    <!-- Page breadcrumb -->
    <h1 class="text-sm font-medium text-gray-300">
      {% block page_title %}Dashboard{% endblock %}
    </h1>
  </div>

  <div class="flex items-center gap-3">
    <!-- HTMX loading spinner -->
    <div class="htmx-indicator w-4 h-4">
      <svg class="animate-spin text-brand-400" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
      </svg>
    </div>

    <!-- System health indicator (auto-polling every 30s) -->
    <div id="system-health"
         hx-get="{% url 'monitoring:current' %}"
         hx-trigger="load, every 30s"
         hx-swap="outerHTML"
         hx-target="#system-health">
      <div class="flex items-center gap-2 text-xs text-surface-400">
        <span class="w-2 h-2 rounded-full bg-surface-500 status-pulse"></span>
        <span>Loading…</span>
      </div>
    </div>

    <!-- Quick actions -->
    {% if user.is_operator %}
    <a href="{% url 'projects:create' %}"
       class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-brand-600 hover:bg-brand-500 text-white text-xs font-medium transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      New Project
    </a>
    {% endif %}

    <!-- User avatar dropdown -->
    <div x-data="{ open: false }" class="relative">
      <button @click="open = !open"
              class="w-8 h-8 rounded-full bg-brand-700 flex items-center justify-center text-sm font-semibold text-white hover:bg-brand-600 transition-colors">
        {{ user.initials }}
      </button>
      <div x-show="open" @click.away="open = false"
           x-transition:enter="transition ease-out duration-100"
           x-transition:enter-start="opacity-0 scale-95"
           x-transition:enter-end="opacity-100 scale-100"
           class="absolute right-0 mt-2 w-48 bg-surface-700 border border-surface-600 rounded-xl shadow-xl py-1 z-50">
        <a href="{% url 'users:profile' %}" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-300 hover:bg-surface-600 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
          Profile
        </a>
        <div class="border-t border-surface-600 my-1"></div>
        <form method="post" action="{% url 'logout' %}">{% csrf_token %}
          <button type="submit" class="w-full flex items-center gap-2 px-4 py-2 text-sm text-red-400 hover:bg-red-900/30 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" /></svg>
            Sign Out
          </button>
        </form>
      </div>
    </div>
  </div>
</header>

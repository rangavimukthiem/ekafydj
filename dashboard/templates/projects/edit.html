{% extends "base.html" %}
{% block title %}Edit {{ project.name }} | EKAFY{% endblock %}
{% block content %}
<div class="max-w-3xl space-y-6">
  <h1 class="text-2xl font-semibold">Edit {{ project.name }}</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="flex gap-3">
      <button class="rounded bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-500">Save</button>
      <a class="rounded bg-surface-700 px-4 py-2 text-sm hover:bg-surface-600" href="{% url 'projects:detail' project.slug %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

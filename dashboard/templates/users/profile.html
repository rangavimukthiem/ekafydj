{% extends "base.html" %}
{% block title %}Profile | EKAFY{% endblock %}
{% block content %}
<div class="max-w-3xl space-y-6">
  <h1 class="text-2xl font-semibold">Profile</h1>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="rounded bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-500">Save Profile</button>
  </form>
</div>
{% endblock %}

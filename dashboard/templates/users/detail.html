{% extends "base.html" %}
{% block title %}{{ target_user.username }} | EKAFY{% endblock %}
{% block content %}
<div class="max-w-3xl space-y-6">
  <div>
    <h1 class="text-2xl font-semibold">{{ target_user.display_name }}</h1>
    <p class="text-sm text-surface-400">{{ target_user.email|default:"No email" }}</p>
  </div>
  <form method="post" action="{% url 'users:change-role' target_user.pk %}" class="space-y-4">
    {% csrf_token %}
    {{ role_form.as_p }}
    <button class="rounded bg-brand-600 px-4 py-2 text-sm font-medium text-white hover:bg-brand-500">Update Role</button>
  </form>
  <form method="post" action="{% url 'users:toggle-active' target_user.pk %}">
    {% csrf_token %}
    <button class="rounded bg-surface-700 px-4 py-2 text-sm hover:bg-surface-600">
      {% if target_user.is_active %}Deactivate{% else %}Activate{% endif %}
    </button>
  </form>
</div>
{% endblock %}

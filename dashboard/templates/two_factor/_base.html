{% extends "base.html" %}

{% block title %}Sign In - EKAFY{% endblock %}

{% block auth_content %}
<section class="w-full min-h-screen flex items-center justify-center px-4 py-10 bg-surface-900">
  <div class="w-full max-w-md">
    <div class="mb-8 text-center">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-xl bg-brand-600">
        <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-normal text-gray-100">EKAFY</h1>
      <p class="mt-2 text-sm text-surface-400">VPS Management Platform</p>
    </div>

    {% if messages %}
    <div class="mb-4 space-y-2">
      {% for message in messages %}
      <div class="rounded-lg border px-4 py-3 text-sm
        {% if message.tags == 'success' %}border-green-700/50 bg-green-900/30 text-green-300
        {% elif message.tags == 'error' %}border-red-700/50 bg-red-900/30 text-red-300
        {% elif message.tags == 'warning' %}border-yellow-700/50 bg-yellow-900/30 text-yellow-300
        {% else %}border-brand-700/50 bg-brand-900/30 text-brand-300{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <div class="rounded-lg border border-surface-600 bg-surface-800 p-6 shadow-2xl shadow-black/30">
      {% block content %}{% endblock %}
    </div>
  </div>
</section>

<style>
  #id_username,
  #id_password,
  #id_token,
  #id_generator-token,
  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="tel"],
  select {
    width: 100%;
    border-radius: 0.5rem;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #e6edf3;
    padding: 0.625rem 0.75rem;
    font-size: 0.875rem;
    outline: none;
  }

  #id_username:focus,
  #id_password:focus,
  #id_token:focus,
  #id_generator-token:focus,
  input:focus,
  select:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.18);
  }

  label {
    display: block;
    margin-bottom: 0.375rem;
    color: #c9d1d9;
    font-size: 0.875rem;
    font-weight: 500;
  }

  form p,
  .form-row,
  .form-group {
    margin-bottom: 1rem;
  }

  button,
  input[type="submit"],
  .btn {
    display: inline-flex;
    min-height: 2.5rem;
    align-items: center;
    justify-content: center;
    border-radius: 0.5rem;
    background: #2563eb;
    color: white;
    padding: 0.625rem 1rem;
    font-size: 0.875rem;
    font-weight: 600;
    transition: background-color 0.15s ease;
  }

  button:hover,
  input[type="submit"]:hover,
  .btn:hover {
    background: #1d4ed8;
  }

  a {
    color: #60a5fa;
  }

  a:hover {
    color: #93c5fd;
  }

  .helptext,
  .text-muted,
  .form-text {
    color: #8b949e;
    font-size: 0.8125rem;
  }

  .errorlist {
    margin-bottom: 1rem;
    border-radius: 0.5rem;
    border: 1px solid rgba(185, 28, 28, 0.5);
    background: rgba(127, 29, 29, 0.3);
    padding: 0.75rem 1rem;
    color: #fca5a5;
    font-size: 0.875rem;
    list-style: none;
  }
</style>
{% endblock %}

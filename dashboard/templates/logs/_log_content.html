<!-- HTMX partial: log content lines -->
{% if log_content %}
{% for line in log_content.splitlines %}
<div class="py-0.5 leading-relaxed
  {% if 'ERROR' in line or 'CRITICAL' in line or 'error' in line %}text-red-400
  {% elif 'WARNING' in line or 'WARN' in line %}text-yellow-400
  {% elif 'INFO' in line %}text-gray-400
  {% elif 'DEBUG' in line %}text-surface-500
  {% else %}text-gray-400{% endif %}">{{ line }}</div>
{% endfor %}
{% else %}
<div class="text-surface-500 italic py-4">No log content available.</div>
{% endif %}
